  - title: Réseau RTE
    ident: reseau_rte
    description: >-
      Le réseau de transport, géré par RTE, conduit l’électricité depuis les centres de production aux gros 
      industriels et jusqu’aux postes électriques. Il est composé de deux types de lignes pour le transport 
      : des lignes à Très Haute Tension (THT, 400 000 et 225 000 volts) et des lignes à Haute Tension 
      (HT, 90 000 et 63 000 volts)
    metadata_url: https://si.enercoop.org/eprod:donnees:reseau
